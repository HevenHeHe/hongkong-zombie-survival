<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hong Kong Zombie Survival</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: Arial, sans-serif; background: #1a1a2e; }
        #game-container { width: 100vw; height: 100vh; position: relative; }
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }
        #hud {
            position: absolute; top: 10px; left: 10px; color: #fff;
            font-size: 18px; text-shadow: 2px 2px 4px #000;
        }
        #hud span { margin-right: 20px; }
        .neon-text { color: #00f0ff; text-shadow: 0 0 10px #00f0ff; }
        #start-screen, #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; align-items: center;
            justify-content: center; flex-direction: column; color: #fff;
        }
        button {
            padding: 15px 30px; font-size: 20px; margin-top: 20px;
            background: #00f0ff; border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold; pointer-events: auto;
        }
        button:hover { background: #ff00ff; color: #fff; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="start-screen">
            <h1 class="neon-text">Hong Kong Zombie Survival</h1>
            <p>Use WASD to move, Mouse to look, SPACE to jump</p>
            <p>Survive as long as possible in zombie-infested Hong Kong!</p>
            <button id="start-btn">Start Game</button>
        </div>
        <div id="ui-overlay">
            <div id="hud">
                <span>Health: <span id="health">100</span>%</span>
                <span>Score: <span id="score">0</span></span>
                <span>Zombies: <span id="zombie-count">0</span></span>
                <span>Day: <span id="day">1</span></span>
            </div>
        </div>
        <div id="game-over" style="display: none;">
            <h1 class="neon-text">GAME OVER</h1>
            <p>Your survival time: <span id="final-time">0</span>s</p>
            <p>Final Score: <span id="final-score">0</span></p>
            <button id="restart-btn">Play Again</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"></script>
    <script>
        // Game configuration
        const CONFIG = {
            PLAYER_SPEED: 5,
            JUMP_FORCE: 8,
            ZOMBIE_SPAWN_RATE: 3000,
            MAX_ZOMBIES: 50,
            DAY_DURATION: 60000 // 1 minute per day
        };

        // Global state
        let scene, camera, renderer, world;
        let player, zombies = [], playerBody;
        let health = 100, score = 0, day = 1, gameTime = 0;
        let isGameStarted = false, isGameOver = false;
        let keys = {}, lastSpawn = 0;

        // Initialize game
        document.addEventListener('DOMContentLoaded', init);

        function init() {
            setupThree();
            setupCannon();
            createEnvironment();
            createPlayer();
            setupControls();
            animate();
            setupUI();
        }

        function setupThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 2;
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('game-container').appendChild(renderer.domElement);
            
            // Lighting
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
            hemiLight.position.set(0, 50, 0);
            scene.add(hemiLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(-3, 10, -10);
            scene.add(dirLight);
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function setupCannon() {
            world = new CANNON.World();
            world.gravity.set(0, -9.82, 0);
            world.broadphase = new CANNON.NaiveBroadphase();
            world.solver.iterations = 10;
        }

        function createEnvironment() {
            // Ground
            const groundGeometry = new THREE.BoxGeometry(200, 1, 200);
            const groundMaterial = new THREE.MeshToonMaterial({ color: 0x3a5a2a });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.position.y = -0.5;
            scene.add(ground);
            
            const groundShape = new CANNON.Box(new CANNON.Vec3(100, 0.5, 100));
            const groundBody = new CANNON.Body({ mass: 0 });
            groundBody.addShape(groundShape);
            groundBody.position.set(0, -1, 0);
            world.addBody(groundBody);
            
            // Hong Kong style buildings (low poly)
            const buildingMaterial = new THREE.MeshToonMaterial({ color: 0x8b4513 });
            for (let i = 0; i < 30; i++) {
                const width = Math.random() * 10 + 5;
                const height = Math.random() * 20 + 10;
                const depth = Math.random() * 10 + 5;
                
                const geometry = new THREE.BoxGeometry(width, height, depth);
                const building = new THREE.Mesh(geometry, buildingMaterial);
                building.position.set(
                    (Math.random() - 0.5) * 180,
                    height / 2,
                    (Math.random() - 0.5) * 180
                );
                scene.add(building);
            }
            
            // Street lights
            for (let i = 0; i < 10; i++) {
                const pole = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.2, 0.2, 5),
                    new THREE.MeshToonMaterial({ color: 0x333333 })
                );
                pole.position.set(i * 30 - 135, 2.5, -80);
                scene.add(pole);
            }
        }

        function createPlayer() {
            // Player capsule
            const geometry = new THREE.CapsuleGeometry(0.5, 1, 4, 8);
            const material = new THREE.MeshToonMaterial({ color: 0x00f0ff });
            player = new THREE.Mesh(geometry, material);
            player.position.set(0, 1, 0);
            scene.add(player);
            
            // Physics body
            const shape = new CANNON.Sphere(0.5);
            playerBody = new CANNON.Body({ mass: 5 });
            playerBody.addShape(shape);
            playerBody.position.set(0, 1, 0);
            world.addBody(playerBody);
            
            // Add box on head (zombie survival gear)
            const gear = new THREE.Mesh(
                new THREE.BoxGeometry(0.8, 0.3, 0.8),
                new THREE.MeshToonMaterial({ color: 0xff6600 })
            );
            gear.position.y = 1.3;
            player.add(gear);
        }

        function createZombie(x, z) {
            if (zombies.length >= CONFIG.MAX_ZOMBIES) return;
            
            const geometry = new THREE.CapsuleGeometry(0.4, 0.8, 4, 8);
            const material = new THREE.MeshToonMaterial({ color: 0xff0066 });
            const zombie = new THREE.Mesh(geometry, material);
            zombie.position.set(x, 0.9, z);
            scene.add(zombie);
            
            const shape = new CANNON.Sphere(0.4);
            const body = new CANNON.Body({ mass: 3 });
            body.addShape(shape);
            body.position.set(x, 0.9, z);
            world.addBody(body);
            
            zombies.push({ mesh: zombie, body: body, speed: 0.02 + Math.random() * 0.02 });
        }

        function setupControls() {
            document.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
            document.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });
            
            // Mouse look
            let yaw = 0, pitch = 0;
            document.addEventListener('mousemove', (e) => {
                if (!isGameStarted || isGameOver) return;
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, pitch));
                camera.rotation.set(pitch, yaw, 0);
            });
        }

        function setupUI() {
            document.getElementById('start-btn').addEventListener('click', startGame);
            document.getElementById('restart-btn').addEventListener('click', restartGame);
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            isGameStarted = true;
            health = 100;
            score = 0;
            day = 1;
            gameTime = 0;
            updateHUD();
        }

        function restartGame() {
            // Reset all zombies
            zombies.forEach(z => {
                scene.remove(z.mesh);
                world.removeBody(z.body);
            });
            zombies = [];
            
            // Reset player
            playerBody.position.set(0, 1, 0);
            playerBody.velocity.set(0, 0, 0);
            player.position.set(0, 1, 0);
            
            // Reset game state
            isGameOver = false;
            isGameStarted = true;
            document.getElementById('game-over').style.display = 'none';
            startGame();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (isGameStarted && !isGameOver) {
                update();
            }
            
            renderer.render(scene, camera);
        }

        function update() {
            world.step(1/60);
            
            // Update player position from physics
            player.position.copy(playerBody.position);
            
            // Player movement
            const moveX = (keys['d'] ? 1 : 0) - (keys['a'] ? 1 : 0);
            const moveZ = (keys['s'] ? 1 : 0) - (keys['w'] ? 1 : 0);
            
            const moveVector = new THREE.Vector3(moveX, 0, moveZ).normalize();
            moveVector.applyQuaternion(camera.quaternion);
            moveVector.y = 0;
            
            playerBody.velocity.x = moveVector.x * CONFIG.PLAYER_SPEED;
            playerBody.velocity.z = moveVector.z * CONFIG.PLAYER_SPEED;
            
            // Jump
            if (keys[' '] && Math.abs(playerBody.velocity.y) < 0.1) {
                playerBody.velocity.y = CONFIG.JUMP_FORCE;
            }
            
            // Camera follows player
            camera.position.x = player.position.x;
            camera.position.z = player.position.z;
            camera.position.y = player.position.y + 0.5;
            
            // Spawn zombies
            const now = Date.now();
            if (now - lastSpawn > CONFIG.ZOMBIE_SPAWN_RATE) {
                const angle = Math.random() * Math.PI * 2;
                const distance = 80 + Math.random() * 40;
                createZombie(
                    player.position.x + Math.cos(angle) * distance,
                    player.position.z + Math.sin(angle) * distance
                );
                lastSpawn = now;
            }
            
            // Update zombies
            zombies.forEach((z, i) => {
                const dx = player.position.x - z.mesh.position.x;
                const dz = player.position.z - z.mesh.position.z;
                const dist = Math.sqrt(dx*dx + dz*dz);
                
                if (dist > 0.5) {
                    z.body.velocity.x = (dx / dist) * z.speed * 50;
                    z.body.velocity.z = (dz / dist) * z.speed * 50;
                } else {
                    // Attack player
                    health -= 0.1;
                }
                
                z.mesh.position.copy(z.body.position);
                
                // Remove dead zombies
                if (z.mesh.position.y < -10) {
                    scene.remove(z.mesh);
                    world.removeBody(z.body);
                    zombies.splice(i, 1);
                    score += 10;
                }
            });
            
            // Day cycle
            gameTime += 16;
            if (gameTime % 60000 === 0) {
                day++;
                score += day * 100;
            }
            
            // Check game over
            if (health <= 0) {
                endGame();
            }
            
            updateHUD();
        }

        function updateHUD() {
            document.getElementById('health').textContent = Math.max(0, Math.round(health));
            document.getElementById('score').textContent = score;
            document.getElementById('zombie-count').textContent = zombies.length;
            document.getElementById('day').textContent = day;
        }

        function endGame() {
            isGameOver = true;
            isGameStarted = false;
            document.getElementById('game-over').style.display = 'flex';
            document.getElementById('final-time').textContent = Math.round(gameTime / 1000);
            document.getElementById('final-score').textContent = score;
        }
    </script>
</body>
</html>
