<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hong Kong Zombie Survival - 香港僵尸生存</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .hero {
            text-align: center;
            padding: 60px 20px 40px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 30px;
        }
        .game-frame {
            width: 100%;
            max-width: 960px;
            aspect-ratio: 16/9;
            margin: 0 auto 30px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 2px solid #ff6b6b;
        }
        .game-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        .feature-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .feature-card h3 { color: #ffd93d; margin-bottom: 10px; }
        .cta {
            text-align: center;
            margin: 40px 0;
        }
        .cta-button {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1.2rem;
            background: linear-gradient(90deg, #ff6b6b, #ff8e53);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
        }
        .metrics-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .metric { text-align: center; }
        .metric-value { font-size: 2rem; font-weight: bold; color: #00ff88; }
        .metric-label { font-size: 0.9rem; color: #888; }
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .game-frame { aspect-ratio: 9/16; }
        }
    </style>
</head>
<body>
    <div class="container">
        <section class="hero">
            <h1>🏙️ Hong Kong Zombie Survival</h1>
            <p class="subtitle">在香港感染区中生存下去 • 免费在线游戏</p>
        </section>

        <div class="metrics-bar">
            <div class="metric">
                <div class="metric-value">&lt;1.50</div>
                <div class="metric-label">CPI Target</div>
            </div>
            <div class="metric">
                <div class="metric-value">35%+</div>
                <div class="metric-label">D1 Retention</div>
            </div>
            <div class="metric">
                <div class="metric-value">5min+</div>
                <div class="metric-label">Session Target</div>
            </div>
        </div>

        <div class="game-frame">
            <iframe src="game.html" id="gameFrame"></iframe>
        </div>

        <div class="features">
            <div class="feature-card">
                <h3>🏗️ 建造基地</h3>
                <p>收集资源建造庇护所</p>
            </div>
            <div class="feature-card">
                <h3>⚔️ 战斗殭屍</h3>
                <p>单键操作，简单上手</p>
            </div>
            <div class="feature-card">
                <h3>🌆 香港风格</h3>
                <p>低多边形香港街景</p>
            </div>
            <div class="feature-card">
                <h3>📱 全平台</h3>
                <p>手机平板电脑通玩</p>
            </div>
        </div>

        <div class="cta">
            <a href="index.html" class="cta-button">开始游戏 - 立即免费玩</a>
        </div>
    </div>

    <!-- AppsFlyer Tracking -->
    <script>
        // Tracking wrapper
        const Track = {
            send(event, params = {}) {
                console.log('[Track]', event, params);
                localStorage.setItem('track_' + event, JSON.stringify({...params, ts: Date.now()}));
            },
            appOpen() { this.send('app_open', { version: '1.0.0', platform: 'web' }); },
            gameStart() { this.send('game_start', { level: 1 }); },
            gameOver(score, time) { this.send('game_over', { score, time }); },
            zombieKill() { this.send('zombie_kill'); },
            resourceCollect(type) { this.send('resource_collect', { type }); }
        };
        Track.appOpen();
    </script>
</body>
</html>
