<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hong Kong Zombie Survival - 香港僵尸生存</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff; min-height: 100vh; overflow-x: hidden;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .hero { text-align: center; padding: 60px 20px 40px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { font-size: 1.2rem; color: #aaa; margin-bottom: 30px; }
        .metrics-bar { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
        .metric { text-align: center; }
        .metric-value { font-size: 2rem; font-weight: bold; color: #00ff88; }
        .metric-label { font-size: 0.9rem; color: #888; }
        .cta { text-align: center; margin: 40px 0; }
        .cta-button {
            display: inline-block; padding: 15px 40px; font-size: 1.2rem;
            background: linear-gradient(90deg, #ff6b6b, #ff8e53); color: white;
            text-decoration: none; border-radius: 30px; font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .cta-button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,107,107,0.4); }
        @media (max-width: 600px) { h1 { font-size: 1.8rem; } }
    </style>
</head>
<body>
    <div class="container">
        <section class="hero">
            <h1>🏙️ Hong Kong Zombie Survival</h1>
            <p class="subtitle">在香港感染区中生存下去 • 免费在线游戏</p>
        </section>
        <div class="metrics-bar">
            <div class="metric"><div class="metric-value">&lt;1.50</div><div class="metric-label">CPI Target</div></div>
            <div class="metric"><div class="metric-value">35%+</div><div class="metric-label">D1 Retention</div></div>
            <div class="metric"><div class="metric-value">5min+</div><div class="metric-label">Session Target</div></div>
        </div>
        <div class="cta">
            <a href="html5-prototype/index.html" class="cta-button">开始游戏 - 立即免费玩</a>
        </div>
    </div>
    <script>localStorage.setItem('track_app_open', JSON.stringify({ts: Date.now()}));</script>
</body>
</html>
